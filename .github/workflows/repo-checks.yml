name: Repo Checks

on:
  push:
    branches:
      - main
      - codex/**
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make Scripts Executable
        run: chmod +x scripts/*.sh .githooks/pre-commit

      - name: Secret Scan
        run: bash scripts/check-secrets.sh

      - name: Shell Syntax
        run: bash -n setup.sh

      - name: Python Syntax
        run: python3 -m py_compile mcp-servers/*.py scripts/*.py

      - name: Parity Diff
        run: python3 scripts/run_harness_parity_diff.py

      - name: Harness Schema Validation
        run: python3 scripts/validate_harness_schema.py

      - name: Setup Flow Tests
        run: bash scripts/test_setup_flows.sh
