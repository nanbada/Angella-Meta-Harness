# ============================================================
# Goose Config — M3 36GB Autoresearch Self-Optimize Loop
# ============================================================
# setup.sh가 이 템플릿을 현재 설치 경로 기준으로 렌더링합니다.
# 직접 복사하지 말고 setup.sh를 통해 설치하세요.
# ============================================================

# --- Model Configuration (Lead/Worker Harness) ---
GOOSE_PROVIDER: "__GOOSE_PROVIDER__"
GOOSE_MODEL: "__GOOSE_MODEL__"
GOOSE_TEMPERATURE: __GOOSE_TEMPERATURE__

# Lead Model (Intent Clarifier + Proposal Generator)
GOOSE_LEAD_PROVIDER: "__GOOSE_LEAD_PROVIDER__"
GOOSE_LEAD_MODEL: "__GOOSE_LEAD_MODEL__"
GOOSE_LEAD_TURNS: 3

# Planner Model
GOOSE_PLANNER_PROVIDER: "__GOOSE_PLANNER_PROVIDER__"
GOOSE_PLANNER_MODEL: "__GOOSE_PLANNER_MODEL__"

# --- Mode & Safety ---
GOOSE_MODE: "smart_approve"
GOOSE_TELEMETRY_ENABLED: false

# --- Input Limit (MLX optimized context) ---
GOOSE_INPUT_LIMIT: __GOOSE_INPUT_LIMIT__

# --- Harness Metadata ---
ANGELLA_HARNESS_PROFILE_ID: "__ANGELLA_HARNESS_PROFILE_ID__"

# --- Recipe GitHub Repo (optional) ---
# GOOSE_RECIPE_GITHUB_REPO: "your-org/goose-recipes"

# --- Extensions ---
extensions:
  developer:
    bundled: true
    enabled: true
    name: developer
    type: builtin
    timeout: 300

  metric-benchmark:
    enabled: true
    name: metric-benchmark
    type: stdio
    cmd: __PYTHON_CMD__
    args:
      - "__ANGELLA_ROOT__/mcp-servers/metric_benchmark.py"
    timeout: 300
    description: "공통 benchmark payload + compare_metrics 제공"

  obsidian-auto-log:
    enabled: true
    name: obsidian-auto-log
    type: stdio
    cmd: __PYTHON_CMD__
    args:
      - "__ANGELLA_ROOT__/mcp-servers/obsidian_auto_log.py"
    timeout: 300
    description: "run-scoped transparency 로그와 final report 저장"

  control-plane-admin:
    enabled: true
    name: control-plane-admin
    type: stdio
    cmd: __PYTHON_CMD__
    args:
      - "__ANGELLA_ROOT__/mcp-servers/control_plane_admin.py"
    timeout: 300
    description: "knowledge draft promotion과 meta-loop codex branch/draft PR export 자동화"

# --- Slash Commands (optional) ---
slash_commands:
  - command: "autoresearch"
    recipe_path: "__RENDERED_RECIPE_PATH__"
  - command: "harness-self-optimize"
    recipe_path: "__RENDERED_HARNESS_SELF_OPTIMIZE_PATH__"
  - command: "optimize-nextjs"
    recipe_path: "__RENDERED_RECIPE_PATH__"
