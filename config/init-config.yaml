# ============================================================
# Angella Meta-Harness — Initial Configuration
# ============================================================
# This configuration defines the default models and modes for the
# Angella Meta-Harness. It is used during the bootstrap process.
# ============================================================

# --- Core Orchestration ---
# Default models used if not overridden by profiles or command line
ANGELLA_LEAD_PROVIDER: openai
ANGELLA_LEAD_MODEL: gpt-5.2-pro

ANGELLA_PLANNER_PROVIDER: openai
ANGELLA_PLANNER_MODEL: gpt-5.2-pro

ANGELLA_WORKER_PROVIDER: openai
ANGELLA_WORKER_MODEL: gpt-5.2

# --- Operational Mode ---
# approved: Always ask for approval before write operations
# auto: Autonomous execution (use with caution)
# smart_approve: Approve minor changes automatically, ask for major ones
ANGELLA_MODE: smart_approve

# --- Telemetry & Security ---
ANGELLA_TELEMETRY_ENABLED: false
ANGELLA_LOG_LEVEL: INFO
