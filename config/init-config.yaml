# ============================================================
# Goose Custom Distribution — Init Config
# ============================================================
# Fork한 Goose repo 루트에 이 파일을 두면 첫 실행 시 자동 적용됩니다.
# 또는 GOOSE_INIT_CONFIG 환경변수로 경로를 지정합니다.
# 
# 참고: https://github.com/block/goose/blob/main/CUSTOM_DISTROS.md
# ============================================================

GOOSE_PROVIDER: openai
GOOSE_MODEL: gpt-5.2

# Lead/Worker Harness
GOOSE_LEAD_PROVIDER: openai
GOOSE_LEAD_MODEL: gpt-5.2-pro
GOOSE_LEAD_TURNS: 3

# Mode
GOOSE_MODE: smart_approve

# Telemetry & Security
GOOSE_TELEMETRY_ENABLED: false
