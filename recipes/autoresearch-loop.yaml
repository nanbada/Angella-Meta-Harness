version: "1.0.0"
title: "M3 Autoresearch Self-Optimize Loop"
description: |
  Karpathy Autoresearch 스타일 ratchet loop + Intent-Based Engineering.
  M3 36GB MLX 백엔드 완전 활용 (Qwen2.5-coder:32b + Gemini 2.5 Pro).
  edit → benchmark → keep/revert 자동 반복.

# setup.sh가 이 템플릿을 현재 설치 경로에 맞게 렌더링합니다.

parameters:
  - key: target_project_path
    input_type: string
    requirement: required
    description: "최적화할 프로젝트 루트 경로 (절대 경로)"

  - key: objective_metric
    input_type: select
    requirement: required
    description: "최적화 목표 메트릭"
    options:
      - build_time
      - tokens_per_second
      - latency_ms
      - bundle_size

  - key: benchmark_command
    input_type: string
    requirement: required
    description: "벤치마크 실행 명령어 (예: 'npm run build', 'python inference.py')"

  - key: max_iterations
    input_type: number
    requirement: optional
    default: "15"
    description: "최대 반복 횟수"

  - key: improvement_threshold
    input_type: number
    requirement: optional
    default: "1.0"
    description: "개선 판정 최소 비율 (%)"

extensions:
  - type: builtin
    name: developer

  - type: stdio
    name: metric-benchmark
    cmd: __PYTHON_CMD__
    args:
      - "__ANGELLA_ROOT__/mcp-servers/metric_benchmark.py"
    timeout: 300
    description: "벤치마크 실행 + metric 추출"

  - type: stdio
    name: obsidian-auto-log
    cmd: __PYTHON_CMD__
    args:
      - "__ANGELLA_ROOT__/mcp-servers/obsidian_auto_log.py"
    timeout: 300
    description: "Loop 결과 자동 로그 저장"

instructions: |
  당신은 M3 36GB MLX 환경에서 동작하는 Autoresearch Self-Optimize Loop 에이전트입니다.
  Karpathy의 Autoresearch ratchet 방식을 따릅니다:
  코드를 수정 → 벤치마크 → baseline 대비 개선되면 keep(commit), 아니면 revert.
  이것을 최대 {{ max_iterations }}회 반복합니다.

  ## 대상 프로젝트
  - 경로: {{ target_project_path }}
  - 목표 메트릭: {{ objective_metric }}
  - 벤치마크 명령: {{ benchmark_command }}
  - 개선 임계값: {{ improvement_threshold }}%

  ## 실행 프로토콜

  ### Phase 0: 초기화
  1. `{{ target_project_path }}`로 이동하여 프로젝트 구조를 분석합니다.
  2. git 상태를 확인합니다 (`git status`). 변경사항이 있으면 먼저 commit합니다.
  3. **Baseline 측정**: `run_benchmark` 도구를 호출합니다:
     - command: "{{ benchmark_command }}"
     - metric_key: "{{ objective_metric }}"
     - working_directory: "{{ target_project_path }}"
  4. baseline 값을 기록합니다.
  5. `save_loop_log`로 iteration 0 (baseline)을 기록합니다.

  ### Phase 1-N: Ratchet Loop (최대 {{ max_iterations }}회)
  
  각 iteration에서:
  
  **Step 1: Intent Clarification (분석)**
  - 현재 코드를 분석하여 `{{ objective_metric }}` 개선 가능한 부분을 찾습니다.
  - 3~5개의 구체적인 개선 아이디어를 생성합니다.
  - 가장 유망한 아이디어 1개를 선택합니다.

  **Step 2: Code Execution (구현)**
  - 선택한 아이디어를 실제 코드로 구현합니다.
  - 변경사항을 `git add -A`로 stage하여 신규 파일까지 포함합니다.
  - staged 변경만 확인한 뒤 `git commit -m "autoresearch: iteration N - [변경 요약]"`으로 commit합니다.

  **Step 3: Benchmark (측정)**
  - `run_benchmark` 도구를 호출하여 현재 메트릭을 측정합니다.

  **Step 4: Ratchet Judge (판정)**
  - `compare_metrics` 도구를 호출하여 baseline 대비 개선 여부를 판정합니다.
  - threshold: {{ improvement_threshold }}%

  **Step 5: Keep or Revert (결정)**
  - ✅ **개선됨**: baseline을 현재 값으로 업데이트하고 계속합니다.
  - ❌ **개선 안됨**: `git revert HEAD --no-edit`로 되돌리고 다음 아이디어를 시도합니다.

  **Step 6: Log (기록)**
  - `save_loop_log` 도구로 이번 iteration 결과를 기록합니다.
  - project_name, iteration, metric_key, metric_value, improvement, summary를 전달합니다.
  - git diff가 있으면 포함합니다.

  ### Phase Final: 종료 조건
  - {{ max_iterations }}회 도달
  - 연속 3회 개선 실패 (GOOSE_LEAD_FAILURE_THRESHOLD)
  - 더 이상 개선 아이디어가 없을 때

  종료 시 `save_final_report` 도구로 최종 보고서를 저장합니다:
  - 전체 git diff (`git diff <start_commit>..HEAD`)
  - 전체 iteration 요약
  - 최종 개선율

  ## 중요 규칙
  - 반드시 git을 사용하여 모든 변경을 추적합니다.
  - 테스트가 있으면 수정 후 테스트가 통과하는지 확인합니다.
  - 리팩토링보다 성능 개선에 집중합니다.
  - 각 iteration에서 하나의 명확한 변경만 합니다.
  - 절대 프로젝트 기능을 망가뜨리지 않습니다.

activities:
  - "message: 🔬 **M3 Autoresearch Self-Optimize Loop**\n\n프로젝트를 지정하고 최적화 목표를 선택하세요.\nedit → benchmark → keep/revert를 최대 {{ max_iterations }}회 자동 반복합니다."
  - "이 프로젝트의 빌드 시간을 30% 이상 줄여줘"
  - "Python inference 스크립트의 tokens/s를 최대화해"
  - "SwiftUI 앱의 launch time을 최적화해"
  - "Next.js 번들 사이즈를 최소화해"
