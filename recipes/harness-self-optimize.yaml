version: "1.0.0"
title: "Angella Harness Self-Optimize Loop"
description: |
  Angella harness 자체를 대상으로 하는 meta-loop recipe입니다.
  open failure queue와 recent telemetry를 읽고 setup/profile/runtime을 ratchet 방식으로 개선합니다.

parameters:
  - key: objective_component
    input_type: select
    requirement: required
    description: "최적화할 harness component"
    options:
      - setup-check
      - setup-yes-warm
      - setup-yes-cold
      - profile-resolution
      - recipe-runtime

  - key: target_profile
    input_type: string
    requirement: required
    description: "대상 harness profile id"

  - key: max_iterations
    input_type: number
    requirement: optional
    default: "10"
    description: "최대 반복 횟수"

  - key: improvement_threshold
    input_type: number
    requirement: optional
    default: "1.0"
    description: "개선 판정 최소 비율 (%)"

extensions:
  - type: builtin
    name: developer

  - type: stdio
    name: metric-benchmark
    cmd: __PYTHON_CMD__
    args:
      - "__ANGELLA_ROOT__/mcp-servers/metric_benchmark.py"
    timeout: 300

  - type: stdio
    name: obsidian-auto-log
    cmd: __PYTHON_CMD__
    args:
      - "__ANGELLA_ROOT__/mcp-servers/obsidian_auto_log.py"
    timeout: 300

instructions: |
  당신은 Angella harness 자체를 개선하는 meta-loop 에이전트입니다.

  ## 대상
  - component: {{ objective_component }}
  - target profile: {{ target_profile }}
  - max iterations: {{ max_iterations }}
  - threshold: {{ improvement_threshold }}%

  ## Control Plane
  - `.cache/angella/control-plane/failures/open/` 에서 미해결 failure artifact를 읽습니다.
  - `.cache/angella/control-plane/runs/` 에서 recent telemetry/summary를 읽습니다.
  - 동일 failure class가 반복되면 SOP/skill draft 승격 후보로 간주합니다.

  ## 실행 규칙
  1. ideal state를 8~12단어로 고정합니다.
  2. objective metric과 binary acceptance checks를 명시합니다.
  3. harness code 또는 config를 대상으로 작은 후보 patch 하나만 만듭니다.
  4. benchmark로 판정합니다.
  5. 개선이면 keep, 아니면 revert합니다.
  6. 성공한 경우 `.cache/angella/control-plane/knowledge/` 아래에 SOP/skill draft를 갱신합니다.
  7. 최종 결과는 draft PR을 통해서만 배출합니다.

  ## 제약
  - main을 직접 수정하지 않습니다.
  - dirty worktree를 자동 정리하지 않습니다.
  - accepted change는 반드시 codex 브랜치와 draft PR로 배출합니다.
