version: "1.0.0"
title: "Angella Harness Self-Optimize Loop"
description: |
  Angella harness 자체를 대상으로 하는 meta-loop recipe입니다.
  open failure queue와 recent telemetry를 읽고 setup/profile/runtime을 ratchet 방식으로 개선합니다.

parameters:
  - key: objective_component
    input_type: select
    requirement: required
    description: "최적화할 harness component"
    options:
      - setup-check
      - setup-yes-warm
      - setup-yes-cold
      - profile-resolution
      - recipe-runtime

  - key: target_profile
    input_type: string
    requirement: required
    description: "대상 harness profile id"

  - key: max_iterations
    input_type: number
    requirement: optional
    default: "10"
    description: "최대 반복 횟수"

  - key: improvement_threshold
    input_type: number
    requirement: optional
    default: "1.0"
    description: "개선 판정 최소 비율 (%)"

extensions:
  - type: builtin
    name: developer

  - type: stdio
    name: metric-benchmark
    cmd: __PYTHON_CMD__
    args:
      - "__ANGELLA_ROOT__/mcp-servers/metric_benchmark.py"
    timeout: 300

  - type: stdio
    name: obsidian-auto-log
    cmd: __PYTHON_CMD__
    args:
      - "__ANGELLA_ROOT__/mcp-servers/obsidian_auto_log.py"
    timeout: 300

  - type: stdio
    name: control-plane-admin
    cmd: __PYTHON_CMD__
    args:
      - "__ANGELLA_ROOT__/mcp-servers/control_plane_admin.py"
    timeout: 300

instructions: |
  당신은 frontier-first personal agent harness인 Angella 자체를 개선하는 meta-loop 에이전트입니다.

  ## 대상
  - component: {{ objective_component }}
  - target profile: {{ target_profile }}
  - max iterations: {{ max_iterations }}
  - threshold: {{ improvement_threshold }}%

  ## Mandatory Sequence
  각 iteration은 아래 순서만 사용합니다.

  1. `control-plane-admin.inspect_control_plane`
     - 가능하면 `format=markdown` 으로 읽고 recent accepted runs, verification-only runs, open failures, pending drafts, retention 상태를 먼저 요약합니다.
     - current selection의 `execution_mode`, `worker_tier`, `fallback_reason`, `local_cache_enabled`, `token_saver_enabled` 를 반드시 확인합니다.
  2. `control-plane-admin.search_harness_knowledge`
     - query seed에는 `objective_component`, 관련 open `failure_type`, selected worker id를 포함합니다.
     - 결과가 있으면 반환된 markdown 경로만 읽고, 없으면 `knowledge/index.md` 와 `knowledge/log.md` 만 읽습니다.
  3. `control-plane-admin.describe_harness_component`
     - `benchmark_command`, `binary_acceptance_checks`, `success_signal`, `priority_files`, `allowed_fix_surface` 를 가져옵니다.
  4. priority files와 관련 open failure / recent summary / matching knowledge만 읽습니다.
     - priority files 밖 경로는 기본적으로 읽지 않습니다.
     - 관련 failure type 이나 selected worker model에 대응하는 `knowledge/sops/` 또는 `knowledge/skills/` 파일이 있으면 먼저 읽고, 없으면 없다고 명시합니다.
     - repo root 전체에 대한 `tree` 또는 `analyze` 호출은 금지합니다.
  5. ideal state를 8~12단어로 고정하고 objective metric + binary acceptance checks를 명시합니다.
  6. benchmark를 먼저 실행해 현재 상태를 확인합니다.
  7. 결과에 따라 아래 셋 중 하나만 고릅니다.
     - `patch`: allowed fix surface 안에서 작은 code/config patch 하나만 만들고 benchmark를 다시 실행합니다.
     - `verification-only`: patch 없이 benchmark 결과와 summary만 기록하고 종료합니다.
     - `revert`: patch를 만들었지만 개선이 없거나 acceptance를 깨면 revert하고 종료합니다.
  8. `verification-only` 이거나 accepted patch가 없으면 `control-plane-admin.record_verification_only_run` 만 호출합니다.
     - 이 경우 finalize tool은 호출하지 않습니다.
  9. accepted patch가 있으면 `control-plane-admin.finalize_accepted_meta_loop_run` 을 호출합니다.
     - 호출 시 `base_branch`, `pr_title`, `pr_summary`, `operator_confirmed` 를 명시합니다.
     - tool 결과의 branch, promoted targets, PR URL을 final summary에 반드시 남깁니다.
  10. dry rehearsal이 필요하면 먼저 같은 tool을 `dry_run=true` 로 호출합니다.
  11. stale draft/queue가 쌓였으면 마지막에 `control-plane-admin.prune_stale_control_plane_artifacts` 를 호출합니다.

  ## 제약
  - main을 직접 수정하지 않습니다.
  - dirty worktree를 자동 정리하지 않습니다.
  - accepted change는 반드시 codex 브랜치와 draft PR로 배출합니다.
  - 기본 전략은 frontier-first 입니다. local worker를 기본 경로로 승격하지 않습니다.
