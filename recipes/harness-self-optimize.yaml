version: "1.0.0"
title: "Angella Harness Self-Optimize Loop"
description: |
  Angella harness 자체를 대상으로 하는 meta-loop recipe입니다.
  open failure queue와 recent telemetry를 읽고 setup/profile/runtime을 ratchet 방식으로 개선합니다.

parameters:
  - key: objective_component
    input_type: select
    requirement: required
    description: "최적화할 harness component"
    options:
      - setup-check
      - setup-yes-warm
      - setup-yes-cold
      - profile-resolution
      - recipe-runtime

  - key: target_profile
    input_type: string
    requirement: required
    description: "대상 harness profile id"

  - key: max_iterations
    input_type: number
    requirement: optional
    default: "10"
    description: "최대 반복 횟수"

  - key: improvement_threshold
    input_type: number
    requirement: optional
    default: "1.0"
    description: "개선 판정 최소 비율 (%)"

extensions:
  - type: builtin
    name: developer

  - type: stdio
    name: metric-benchmark
    cmd: __PYTHON_CMD__
    args:
      - "__ANGELLA_ROOT__/mcp-servers/metric_benchmark.py"
    timeout: 300

  - type: stdio
    name: obsidian-auto-log
    cmd: __PYTHON_CMD__
    args:
      - "__ANGELLA_ROOT__/mcp-servers/obsidian_auto_log.py"
    timeout: 300

  - type: stdio
    name: control-plane-admin
    cmd: __PYTHON_CMD__
    args:
      - "__ANGELLA_ROOT__/mcp-servers/control_plane_admin.py"
    timeout: 300

instructions: |
  당신은 Angella harness 자체를 개선하는 meta-loop 에이전트입니다.

  ## 대상
  - component: {{ objective_component }}
  - target profile: {{ target_profile }}
  - max iterations: {{ max_iterations }}
  - threshold: {{ improvement_threshold }}%

  ## Control Plane
  - 시작 전에 `control-plane-admin.inspect_control_plane` 으로 recent runs, open failures, pending drafts, queue 상태를 요약합니다.
  - `.cache/angella/control-plane/failures/open/` 에서 미해결 failure artifact를 읽습니다.
  - `.cache/angella/control-plane/runs/` 에서 recent telemetry/summary를 읽습니다.
  - 동일 failure class가 반복되면 SOP/skill draft 승격 후보로 간주합니다.

  ## 실행 규칙
  1. ideal state를 8~12단어로 고정합니다.
  2. objective metric과 binary acceptance checks를 명시합니다.
  3. harness code 또는 config를 대상으로 작은 후보 patch 하나만 만듭니다.
  4. benchmark로 판정합니다.
  5. 개선이면 keep, 아니면 revert합니다.
  6. 성공한 경우 `control-plane-admin.finalize_accepted_meta_loop_run` 을 호출합니다.
     - 이 tool은 `.cache/angella/control-plane/knowledge/` 아래 draft를 만들고,
       promotion rule이 만족되면 tracked `knowledge/sops/` 또는 `knowledge/skills/` 로 승격합니다.
     - tracked target이 이미 존재하면 run-scoped addendum 형태로 merge를 시도합니다.
     - 그런 다음 accepted change를 `codex/` 브랜치로 내보내고 draft PR을 생성합니다.
     - 호출 시 `base_branch`, `pr_title`, `pr_summary`, `operator_confirmed` 값을 명시합니다.
  7. tool 호출 결과의 branch, promoted targets, PR URL을 final summary에 반드시 남깁니다.
  8. dry rehearsal이 필요하면 먼저 `dry_run=true` 로 같은 tool을 호출합니다.
  9. stale draft/queue가 쌓였으면 `control-plane-admin.prune_stale_control_plane_artifacts` 로 정리합니다.

  ## 제약
  - main을 직접 수정하지 않습니다.
  - dirty worktree를 자동 정리하지 않습니다.
  - accepted change는 반드시 codex 브랜치와 draft PR로 배출합니다.
