version: 1.0.0
title: Personal AI Agent Loop (Multi-Tier)
description: |
  A self-improving personal agent loop that manages OS-level tasks,
  maintains long-term memory via the knowledge base, and roots
  its cognition using Gemini, Claude, and local Gemma 4.

# setup.sh가 이 템플릿을 현재 설치 경로에 맞게 렌더링합니다.

instructions: |
  1. Intent Analysis & Scope Bound (중요): 사용자의 목표를 깊이 분석하세요. 파일 작업을 수행하기 전, 작업에 필요한 `priority_files`(최대 3-5개)를 명시적으로 정의하고 그 안에서만 움직이세요.
  2. LLM-Wiki Operations: 
     - **Ingest:** `llmwiki_ingest`를 사용하여 URL이나 파일을 `knowledge/sources/`에 추가하세요.
     - **Compile:** 지식이 업데이트된 후 `llmwiki_compile`을 실행하여 구조화하세요.
     - **Query:** 지식 검색이 필요한 경우 `llmwiki_query`(필요시 `save=true`)를 호출하여 과거 기록을 먼저 확인하세요.
  3. Execution: 도구 호출은 순차적으로 수행하세요. 로컬/오프라인 작업이 주를 이룰 경우 `local_lab` 프로파일이나 로컬 Gemma 4 모델로의 Fallback을 고려하세요.
  4. Token Efficiency & Compaction: 긴 터미널 출력이나 로그는 그대로 읽지 말고 항상 `output_compactor`의 `compact_output`을 사용하여 요약된 핵심 내용만 파악하세요.
  5. Scion Swarm Coordination: Google Scion 환경에서 동작 중일 경우, 세션 시작 시 `scion_prune_stale`와 `scion_inspect_state`로 shared state를 점검하세요. 다른 에이전트와 충돌이 예상되는 광범위한 작업 전 `scion_query_peers`를 호출하고, 실제 수정 범위가 정해지면 `scion_claim_files`로 claim을 남기세요. 긴 작업은 `scion_heartbeat`로 갱신하고, 작업이 끝나면 `scion_release_claims`로 해제하세요.
  6. Final Report: 수행 결과와 위키 업데이트 여부를 요약하여 보고하세요.

extensions:
  - type: builtin
    name: developer

  - type: stdio
    name: output-compactor
    cmd: __PYTHON_CMD__
    args:
      - "__ANGELLA_ROOT__/mcp-servers/output_compactor.py"
    timeout: 300
    description: "컨텍스트 절약을 위해 길고 반복적인 로그/출력을 요약"

  - type: stdio
    name: personal-context
    cmd: __PYTHON_CMD__
    args:
      - "__ANGELLA_ROOT__/mcp-servers/personal_context_ops.py"
    timeout: 300
    description: "캘린더, 메모, 클립보드 등 로컬 OS 컨텍스트 접근"

  - type: stdio
    name: llm-wiki-compiler
    cmd: __PYTHON_CMD__
    args:
      - "__ANGELLA_ROOT__/mcp-servers/llmwiki_compiler_ops.py"
    timeout: 300
    description: "Harness 영구 기억 장소 (과거 SOP/지식 검색 및 저장)"

  - type: stdio
    name: scion-coordination
    cmd: __PYTHON_CMD__
    args:
      - "__ANGELLA_ROOT__/mcp-servers/scion_coordination_ops.py"
    timeout: 300
    description: "Google Scion Hub를 통해 병렬로 동작 중인 다른 Angella 에이전트와 충돌을 방지하고 지식을 공유"

settings:
  GOOSE_LEAD_TURNS: 5
  GOOSE_LEAD_FAILURE_THRESHOLD: 3
  MAX_ITERATIONS: 10
  OBJECTIVE_METRIC: "task_completion_rate"

parameters:
  - name: os_context
    type: string
    description: Current specific OS context or path the user is working inside (optional)
    required: false

activities:
  - "오늘 캘린더 일정을 스캔하고 중요한 프로젝트 노트를 요약해줘."
  - "로컬 KnowledgeBase를 분석해서 어제 실패한 코드 패턴을 SOP로 등록해줘."
  - "이 로컬 폴더들을 정리하고, 결과를 압축된 로그로 만들어줘."
