version: "1.0.0"
title: "Code Optimization Sub-Recipe"
description: |
  선택형 adapter용 서브 recipe입니다.
  공식 v1 기본 flow는 메인 autoresearch-loop.yaml 하나이며, 이 sub-recipe는 동일 운영 원칙을 따르는 보조 블록으로만 유지합니다.

parameters:
  - key: target_path
    input_type: string
    requirement: required
    description: "최적화할 프로젝트 경로"

  - key: metric_key
    input_type: string
    requirement: required
    description: "최적화 목표 메트릭 (build_time, tokens_per_second, latency_ms, bundle_size)"

  - key: iteration_number
    input_type: number
    requirement: required
    description: "현재 iteration 번호"

  - key: previous_attempts
    input_type: string
    requirement: optional
    default: ""
    description: "이전에 시도하여 실패한 최적화 아이디어들 (중복 방지)"

extensions:
  - type: builtin
    name: developer

instructions: |
  당신은 코드 최적화 전문가입니다.
  이 sub-recipe는 이미 preflight와 run branch가 준비된 상태에서만 사용합니다.

  ## 대상
  - 프로젝트: {{ target_path }}
  - 목표 메트릭: {{ metric_key }}
  - Iteration: {{ iteration_number }}

  ## 이전 실패한 시도들
  {{ previous_attempts }}

  ## 작업 순서
  1. `{{ target_path }}`의 프로젝트 구조를 빠르게 파악합니다.
  2. `{{ metric_key }}`에 직접 영향을 주는 파일/모듈만 좁혀 봅니다.
  3. 중복되지 않는 개선 아이디어 3~5개를 제안합니다.
  4. 각 아이디어에 대해 예상 효과, 난이도, 리스크를 간단히 적습니다.
  5. 가장 유망한 아이디어 1개만 선택합니다.
  6. 최소 변경으로 구현합니다. 목표와 무관한 리팩토링은 하지 않습니다.
  7. 테스트가 있으면 관련 테스트를 실행합니다.
  8. 변경사항은 반드시 아래 순서로 기록합니다.
     - `git add -A`
     - `git commit -m "autoresearch: iter {{ iteration_number }} - [변경 요약]"`

  ## 메트릭별 힌트
  - `build_time`: import 정리, build 설정 최적화, code splitting
  - `tokens_per_second`: batching, quantization, MLX 경로 단순화
  - `latency_ms`: I/O 제거, 캐싱, 알고리즘 단순화
  - `bundle_size`: dead dependency 제거, dynamic import, asset 축소

  ## 제약 조건
  - 기능을 망가뜨리지 않습니다.
  - 한 iteration에는 하나의 명확한 변경만 넣습니다.
  - 선택 이유와 예상 효과를 다음 단계 logger가 기록할 수 있게 짧게 정리합니다.
