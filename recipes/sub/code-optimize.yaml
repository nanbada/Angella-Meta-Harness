version: "1.0.0"
title: "Code Optimization Sub-Recipe"
description: |
  프로젝트 코드를 분석하고, 지정된 메트릭에 대해 최적화 아이디어를 
  제안하고 구현합니다. Autoresearch loop의 Step 1-2에 해당합니다.

parameters:
  - key: target_path
    input_type: string
    requirement: required
    description: "최적화할 프로젝트 경로"

  - key: metric_key
    input_type: string
    requirement: required
    description: "최적화 목표 메트릭 (build_time, tokens_per_second, latency_ms, bundle_size)"

  - key: iteration_number
    input_type: number
    requirement: required
    description: "현재 iteration 번호"

  - key: previous_attempts
    input_type: string
    requirement: optional
    default: ""
    description: "이전에 시도하여 실패한 최적화 아이디어들 (중복 방지)"

extensions:
  - type: builtin
    name: developer

instructions: |
  당신은 코드 최적화 전문가입니다. 

  ## 대상
  - 프로젝트: {{ target_path }}
  - 목표 메트릭: {{ metric_key }}
  - Iteration: {{ iteration_number }}

  ## 이전 실패한 시도들 (이것들은 피하세요)
  {{ previous_attempts }}

  ## 작업 순서

  ### 1. 코드 분석
  - `{{ target_path }}`의 프로젝트 구조를 빠르게 파악합니다.
  - `{{ metric_key }}`에 영향을 미치는 핵심 파일/모듈을 식별합니다.
  - 병목 지점을 분석합니다.

  ### 2. 아이디어 생성
  - `{{ metric_key }}` 개선을 위한 3~5개의 구체적 아이디어를 제안합니다.
  - 각 아이디어에 대해:
    - 예상 개선 효과 (%)
    - 구현 난이도 (low/medium/high)
    - 리스크 (기능 파손 가능성)
  - 이전 실패한 시도와 중복되지 않아야 합니다.

  ### 3. 최적 아이디어 선택
  - 효과/리스크 비율이 가장 높은 아이디어 1개를 선택합니다.

  ### 4. 구현
  - 선택한 아이디어를 실제 코드로 구현합니다.
  - 최소한의 변경으로 진행합니다 (1~3 파일 이내).
  - 테스트가 있으면 테스트도 통과하는지 확인합니다.

  ### 5. Git Commit
  - 변경사항을 commit합니다:
    ```
    git add -A
    git commit -m "autoresearch: iter {{ iteration_number }} - [변경 요약]"
    ```

  ## 메트릭별 최적화 전략

  ### build_time
  - 불필요한 import 제거, 트리 셰이킹 최적화
  - 빌드 설정 조정 (webpack/turbopack/swc 설정)
  - 코드 스플리팅 개선

  ### tokens_per_second
  - 배치 사이즈 최적화
  - 양자화 설정 조정
  - 불필요한 전처리/후처리 제거
  - MLX 특화 최적화

  ### latency_ms
  - I/O 병목 제거 (async/await 활용)
  - 캐싱 추가
  - 알고리즘 최적화

  ### bundle_size
  - 사용하지 않는 의존성 제거
  - 동적 import 활용
  - 이미지/에셋 최적화

  ## 제약 조건
  - 기능을 절대 망가뜨리지 않습니다.
  - 한 번에 하나의 명확한 변경만 합니다.
  - 변경 이유를 commit 메시지에 명확히 기록합니다.
