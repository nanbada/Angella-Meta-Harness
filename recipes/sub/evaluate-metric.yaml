version: "1.0.0"
title: "Metric Evaluation Sub-Recipe"
description: |
  선택형 adapter용 서브 recipe입니다.
  공식 v1 기본 flow는 메인 autoresearch-loop.yaml 하나이며, 이 sub-recipe는 같은 benchmark payload 계약을 재사용하는 보조 블록입니다.

parameters:
  - key: project_path
    input_type: string
    requirement: required
    description: "프로젝트 경로"

  - key: benchmark_command
    input_type: string
    requirement: required
    description: "벤치마크 명령어"

  - key: metric_key
    input_type: string
    requirement: required
    description: "메트릭 키"

  - key: baseline_value
    input_type: number
    requirement: required
    description: "baseline 메트릭 값"

  - key: threshold_percent
    input_type: number
    requirement: optional
    default: "1.0"
    description: "개선 판정 최소 비율 (%)"

extensions:
  - type: builtin
    name: developer

  - type: stdio
    name: metric-benchmark
    cmd: __PYTHON_CMD__
    args:
      - "__ANGELLA_ROOT__/mcp-servers/metric_benchmark.py"
    timeout: 300

instructions: |
  당신은 벤치마크 평가자입니다. 이 sub-recipe는 이미 생성된 candidate commit을 keep/revert하는 보조 단계입니다.

  ## 작업 순서
  1. `run_benchmark`를 호출합니다.
     - command: "{{ benchmark_command }}"
     - metric_key: "{{ metric_key }}"
     - working_directory: "{{ project_path }}"
  2. benchmark payload의 `success`를 먼저 확인합니다.
     - `success=false`면 `git revert HEAD --no-edit`를 실행합니다.
     - baseline은 유지합니다.
     - action은 `failure`로 기록합니다.
  3. benchmark가 성공했을 때만 `compare_metrics`를 호출합니다.
     - baseline: {{ baseline_value }}
     - current: 측정된 `metric_value`
     - metric_key: "{{ metric_key }}"
     - threshold_percent: {{ threshold_percent }}
  4. 개선이면 keep합니다.
  5. 개선이 아니면 `git revert HEAD --no-edit`로 되돌립니다.

  ## 반환 형식
  아래 항목을 반드시 포함해 요약합니다.
  - current_metric
  - baseline
  - is_improved
  - action_taken (`keep`, `revert`, `failure`)
  - new_baseline
  - failure_reason
